<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập · FoodShip</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Roboto', Arial, sans-serif; background: #F5F5F5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .login-card { background: #FFF; border: 1px solid #DDD; border-radius: 8px; padding: 40px 30px; width: 460px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
    .logo { font-size: 28px; font-weight: 700; color: #B8860B; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .subtitle { color: #666; font-size: 14px; text-align: center; margin-bottom: 20px; }
    .tab-switch { display: flex; border-bottom: 1px solid #DDD; margin-bottom: 24px; }
    .tab-btn { flex: 1; padding: 12px; font-weight: 600; font-size: 15px; border: none; background: transparent; color: #888; cursor: pointer; transition: 0.2s; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: #B8860B; border-bottom: 2px solid #B8860B; }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #333; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #DDD; border-radius: 4px; font-size: 14px; font-family: inherit; transition: 0.2s; }
    .form-group input:focus { border-color: #B8860B; outline: none; }
    .btn-action { width: 100%; padding: 14px; background: #B8860B; border: none; color: white; font-weight: 700; font-size: 16px; border-radius: 4px; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
    .btn-action:hover { background: #9E7609; }
    .msg { text-align: center; margin-top: 12px; font-size: 13px; display: none; }
    .msg.error { color: #C62828; }
    .msg.success { color: #2E7D32; }
    .back-link { display: block; text-align: center; margin-top: 16px; color: #B8860B; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo"><i class="fas fa-utensils"></i> FoodShip</div>
  <div class="subtitle" id="roleSubtitle">...</div>

  <div class="tab-switch">
    <button class="tab-btn active" id="tabLogin">Đăng nhập</button>
    <button class="tab-btn" id="tabRegister">Đăng ký</button>
  </div>

  <div class="form-panel active" id="loginPanel">
    <form id="loginForm">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="email@example.com" required></div>
      <div class="form-group"><label>Mật khẩu</label><input type="password" id="loginPassword" placeholder="Mật khẩu" required></div>
      <button type="submit" class="btn-action"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
      <div class="msg error" id="loginError"></div>
    </form>
  </div>

  <div class="form-panel" id="registerPanel">
    <form id="registerForm">
      <div id="registerFields"></div>
      <button type="submit" class="btn-action"><i class="fas fa-user-plus"></i> Đăng ký</button>
      <div class="msg error" id="registerError"></div>
      <div class="msg success" id="registerSuccess"></div>
    </form>
  </div>

  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại chọn vai trò</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const role = params.get('role') || 'customer';
  document.getElementById('roleSubtitle').textContent = { customer: 'Khách hàng', shipper: 'Shipper', store: 'Quản lý cửa hàng' }[role] || 'Khách hàng';

  function renderRegisterFields() {
    let html = `
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="email@example.com" required></div>
      <div class="form-group"><label>Mật khẩu</label><input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự" minlength="6" required></div>`;
    if (role === 'customer') {
      html += `
        <div class="form-group"><label>Họ và tên</label><input type="text" id="regName" placeholder="Nguyễn Văn A" required></div>
        <div class="form-group"><label>Ngày sinh</label><input type="date" id="regDob" required></div>
        <div class="form-group"><label>Địa chỉ</label><input type="text" id="regAddress" placeholder="Số nhà, đường, quận..." required></div>
        <div class="form-group"><label>Số điện thoại</label><input type="tel" id="regPhone" placeholder="0912345678" pattern="[0-9]{10}" required></div>`;
    } else if (role === 'shipper') {
      html += `
        <div class="form-group"><label>Họ và tên</label><input type="text" id="regName" required></div>
        <div class="form-group"><label>Số điện thoại</label><input type="text" id="regPhone" required></div>
        <div class="form-group"><label>Phương tiện</label><input type="text" id="regVehicle" required></div>`;
    } else if (role === 'store') {
      html += `
        <div class="form-group"><label>Tên cửa hàng</label><input type="text" id="regStoreName" required></div>
        <div class="form-group"><label>Địa chỉ</label><input type="text" id="regAddress" required></div>
        <div class="form-group"><label>Số điện thoại</label><input type="text" id="regPhone" required></div>`;
    }
    document.getElementById('registerFields').innerHTML = html;
  }
  renderRegisterFields();

  document.getElementById('tabLogin').addEventListener('click', () => switchTab('login'));
  document.getElementById('tabRegister').addEventListener('click', () => switchTab('register'));
  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
    document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('registerError').style.display = 'none';
    document.getElementById('registerSuccess').style.display = 'none';
  }

  function getUsers(role) { return JSON.parse(localStorage.getItem('users_' + role) || '[]'); }
  function saveUsers(role, users) { localStorage.setItem('users_' + role, JSON.stringify(users)); }

  document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorEl = document.getElementById('registerError');
    const successEl = document.getElementById('registerSuccess');
    errorEl.style.display = 'none';
    successEl.style.display = 'none';
    
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    
    let payload = { email, password };
    let endpoint = '';

    if (role === 'customer') {
      const name = document.getElementById('regName').value.trim();
      const birthday = document.getElementById('regDob').value;
      const address = document.getElementById('regAddress').value.trim();
      const SDT = document.getElementById('regPhone').value.trim();
      if (!name || !birthday || !address || !SDT) { errorEl.textContent = 'Vui lòng điền đầy đủ thông tin.'; errorEl.style.display = 'block'; return; }
      payload = { ...payload, name, birthday, address, SDT };
      endpoint = 'api/customer/register';
    } else if (role === 'shipper') {
      const name = document.getElementById('regName').value.trim();
      const birthday = document.getElementById('regDob').value;
      const SDT = document.getElementById('regPhone').value.trim();
      if (!name || !birthday || !SDT) { errorEl.textContent = 'Vui lòng điền đầy đủ thông tin.'; errorEl.style.display = 'block'; return; }
      payload = { ...payload, name, birthday, SDT };
      endpoint = 'api/shipper/register';
    } else if (role === 'store') {
      const shopName = document.getElementById('regStoreName').value.trim();
      const address = document.getElementById('regAddress').value.trim();
      const SDT = document.getElementById('regPhone').value.trim();
      if (!shopName || !address || !SDT) { errorEl.textContent = 'Vui lòng điền đầy đủ thông tin.'; errorEl.style.display = 'block'; return; }
      payload = { ...payload, shopName, address, SDT };
      endpoint = 'api/shop/register';
    }

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      if (result.success) {
        successEl.textContent = 'Đăng ký thành công! Chuyển sang đăng nhập...';
        successEl.style.display = 'block';
        setTimeout(() => { switchTab('login'); document.getElementById('loginEmail').value = email; }, 1000);
      } else {
        errorEl.textContent = result.message || 'Đăng ký thất bại';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = 'Lỗi kết nối server: ' + err.message;
      errorEl.style.display = 'block';
    }
  });

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');
    errorEl.style.display = 'none';

    let endpoint = '';
    if (role === 'customer') endpoint = 'api/customer/login';
    else if (role === 'shipper') endpoint = 'api/shipper/login';
    else if (role === 'store') endpoint = 'api/shop/login';

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const result = await response.json();
      if (result.success) {
        localStorage.setItem('currentUser', JSON.stringify({ email: result.email, role: result.role, name: result.name || result.email }));
        window.location.href = 'user_profile.html';
      } else {
        errorEl.textContent = result.message || 'Email hoặc mật khẩu sai!';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = 'Lỗi kết nối server: ' + err.message;
      errorEl.style.display = 'block';
    }
  });
</script>
</body>
</html>
