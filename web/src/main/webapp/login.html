<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập · FoodShip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
<div class="login-card">
  <div class="logo"><i class="fas fa-utensils"></i> FoodShip</div>
  <div class="subtitle" id="roleSubtitle">Khách hàng</div>

  <div class="tab-switch">
    <button class="tab-btn active" id="tabLogin">Đăng nhập</button>
    <button class="tab-btn" id="tabRegister">Đăng ký</button>
  </div>

  <div class="form-panel active" id="loginPanel">
    <form id="loginForm">
      <div class="form-group">
        <label>Vai trò</label>
        <select id="loginRole">
          <option value="customer">Khách hàng</option>
          <option value="store">Cửa hàng</option>
          <option value="shipper">Shipper</option>
        </select>
      </div>
      <div class="form-group"><label>Email</label><div class="input-wrap"><i class="fas fa-envelope input-icon"></i><input type="email" id="loginEmail" placeholder="email@example.com" required></div></div>
      <div class="form-group"><label>Mật khẩu</label><div class="input-wrap"><i class="fas fa-lock input-icon"></i><input type="password" id="loginPassword" placeholder="Mật khẩu" required></div></div>
      <button type="submit" class="btn-action"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
      <div class="msg error" id="loginError"></div>
    </form>
  </div>

  <div class="form-panel" id="registerPanel">
    <form id="registerForm">
      <div class="form-group">
        <label>Vai trò đăng ký</label>
        <select id="registerRole">
          <option value="customer">Khách hàng</option>
          <option value="store">Cửa hàng</option>
          <option value="shipper">Shipper</option>
        </select>
      </div>
      <div id="registerFields"></div>
      <button type="submit" class="btn-action"><i class="fas fa-user-plus"></i> Đăng ký</button>
      <div class="msg error" id="registerError"></div>
      <div class="msg success" id="registerSuccess"></div>
    </form>
  </div>

  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại chọn vai trò</a>
</div>

<script src="assets/js/login.js"></script>
</body>
</html>
