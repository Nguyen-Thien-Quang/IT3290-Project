<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodShip - Chọn vai trò</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Roboto', Arial, sans-serif; background: #F5F5F5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .role-container { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 40px 30px; text-align: center; width: 400px; }
    .logo { font-size: 32px; font-weight: 700; color: #B8860B; margin-bottom: 10px; }
    .subtitle { color: #666; font-size: 16px; margin-bottom: 30px; }
    .role-buttons { display: flex; flex-direction: column; gap: 16px; }
    .role-btn { padding: 18px; font-size: 18px; font-weight: 700; border: 2px solid #DDD; border-radius: 8px; background: white; color: #333; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; }
    .role-btn i { font-size: 22px; }
    .role-btn:hover { border-color: #B8860B; color: #B8860B; background: #FFF9E6; }
  </style>
</head>
<body>
  <div class="role-container">
    <div class="logo"><i class="fas fa-utensils"></i> FoodShip</div>
    <div class="subtitle">Bạn là ai?</div>
    <div class="role-buttons">
      <a href="login.html?role=customer" class="role-btn"><i class="fas fa-user"></i> Khách hàng</a>
      <a href="login.html?role=shipper" class="role-btn"><i class="fas fa-motorcycle"></i> Shipper</a>
      <a href="login.html?role=store" class="role-btn"><i class="fas fa-store"></i> Quản lý cửa hàng</a>
    </div>
  </div>
</body>
</html>
