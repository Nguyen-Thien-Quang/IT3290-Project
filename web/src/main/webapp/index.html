<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodShip - Chọn vai trò</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="assets/css/index.css">
</head>
<body>
  <div class="role-container">
    <div class="logo"><i class="fas fa-utensils"></i> FoodShip</div>
    <p class="tagline">Đồ ăn ngon — giao tận nơi</p>
    <div class="role-buttons">
      <a href="login.html?role=customer" class="role-btn">
        <i class="fas fa-user"></i>
        <span class="role-btn-text">
          <span class="role-btn-title">Khách hàng</span>
          <span class="role-btn-desc">Đặt món và theo dõi đơn hàng</span>
        </span>
      </a>
      <a href="login.html?role=shipper" class="role-btn">
        <i class="fas fa-motorcycle"></i>
        <span class="role-btn-text">
          <span class="role-btn-title">Shipper</span>
          <span class="role-btn-desc">Nhận đơn và giao hàng</span>
        </span>
      </a>
      <a href="login.html?role=store" class="role-btn">
        <i class="fas fa-store"></i>
        <span class="role-btn-text">
          <span class="role-btn-title">Quản lý cửa hàng</span>
          <span class="role-btn-desc">Quản lý menu và doanh thu</span>
        </span>
      </a>
    </div>
  </div>
</body>
</html>
