<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập · FoodShip</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #F5F5F5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-card {
      background: #FFFFFF;
      border: 1px solid #DDD;
      border-radius: 8px;
      padding: 40px 30px;
      width: 420px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #B8860B;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-bottom: 20px;
    }
    .tab-switch {
      display: flex;
      border-bottom: 1px solid #DDD;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      font-weight: 600;
      font-size: 15px;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: 0.2s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: #B8860B;
      border-bottom: 2px solid #B8860B;
    }
    .form-panel {
      display: none;
    }
    .form-panel.active {
      display: block;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
      color: #333;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #DDD;
      border-radius: 4px;
      font-size: 15px;
      font-family: inherit;
      transition: 0.2s;
    }
    .form-group input:focus {
      border-color: #B8860B;
      outline: none;
    }
    .btn-action {
      width: 100%;
      padding: 14px;
      background: #B8860B;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-action:hover {
      background: #9E7609;
    }
    .msg {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      display: none;
    }
    .msg.error { color: #C62828; }
    .msg.success { color: #2E7D32; }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #888;
      background: #F9F9F9;
      padding: 8px;
      border-radius: 4px;
      border: 1px dashed #DDD;
      text-align: center;
    }
    .hint i { color: #B8860B; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo"><i class="fas fa-utensils"></i> FoodShip</div>
    <div class="subtitle">Shipper Dashboard</div>

    <div class="tab-switch">
      <button class="tab-btn active" id="tabLogin">Đăng nhập</button>
      <button class="tab-btn" id="tabRegister">Đăng ký</button>
    </div>

    <!-- Form đăng nhập -->
    <div class="form-panel active" id="loginPanel">
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="nghiengiaohang@..." required>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="loginPassword" placeholder="Mật khẩu" required>
        </div>
        <button type="submit" class="btn-action"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
        <div class="msg error" id="loginError">Sai email hoặc mật khẩu!</div>
      </form>
    </div>

    <!-- Form đăng ký -->
    <div class="form-panel" id="registerPanel">
      <form id="registerForm">
        <div class="form-group">
          <label>Họ và tên</label>
          <input type="text" id="regName" placeholder="Lữ Văn Bố" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự" minlength="6" required>
        </div>
        <button type="submit" class="btn-action"><i class="fas fa-user-plus"></i> Đăng ký</button>
        <div class="msg error" id="registerError"></div>
        <div class="msg success" id="registerSuccess"></div>
      </form>
    </div>

    <div class="hint">
      <i class="fas fa-info-circle"></i> Đăng nhập để vào Dashboard
    </div>
  </div>

  <script>
    // ======= CẤU HÌNH BACKEND =======
    const API_BASE = 'https://your-backend.com/api'; // <-- Thay bằng URL thật
    // =================================

    // Chuyển tab
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginPanel = document.getElementById('loginPanel');
    const registerPanel = document.getElementById('registerPanel');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      loginPanel.classList.add('active');
      registerPanel.classList.remove('active');
      clearMessages();
    });
    tabRegister.addEventListener('click', () => {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      registerPanel.classList.add('active');
      loginPanel.classList.remove('active');
      clearMessages();
    });

    function clearMessages() {
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('registerError').style.display = 'none';
      document.getElementById('registerSuccess').style.display = 'none';
    }

    // Lưu token + chuyển trang
    function loginSuccess(token, name) {
      localStorage.setItem('authToken', token);
      localStorage.setItem('shipperName', name);
      window.location.href = 'index.html';
    }

    // ---------- API CALLS ----------
    async function apiLogin(email, password) {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'Đăng nhập thất bại');
      }
      return res.json(); // { token, user: { name } }
    }

    async function apiRegister(name, email, password) {
      const res = await fetch(`${API_BASE}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'Đăng ký thất bại');
      }
      return res.json(); // { token, user: { name } }
    }

    // ---------- HANDLERS ----------
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';

      try {
        const data = await apiLogin(email, password);
        loginSuccess(data.token, data.user.name);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const errorEl = document.getElementById('registerError');
      const successEl = document.getElementById('registerSuccess');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!name || !email || password.length < 6) {
        errorEl.textContent = 'Vui lòng điền đầy đủ thông tin, mật khẩu ít nhất 6 ký tự.';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const data = await apiRegister(name, email, password);
        successEl.textContent = 'Đăng ký thành công! Đang chuyển...';
        successEl.style.display = 'block';
        setTimeout(() => loginSuccess(data.token, data.user.name), 800);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
